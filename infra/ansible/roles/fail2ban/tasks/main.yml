---
- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present

- name: Deploy Caddy auth-failure filter
  ansible.builtin.copy:
    src: caddy-auth.conf
    dest: /etc/fail2ban/filter.d/caddy-auth.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Deploy Coraza WAF-block filter
  ansible.builtin.copy:
    src: caddy-coraza.conf
    dest: /etc/fail2ban/filter.d/caddy-coraza.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Deploy jail.local
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd_service:
    name: fail2ban
    enabled: true
    state: started
