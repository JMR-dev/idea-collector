---
- name: Install nftables
  ansible.builtin.apt:
    name: nftables
    state: present

- name: Remove ufw (conflicts with nftables ruleset)
  ansible.builtin.apt:
    name: ufw
    state: absent

- name: Deploy nftables ruleset
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
    validate: "nft -c -f %s"
  notify: Reload nftables

- name: Enable and start nftables
  ansible.builtin.systemd_service:
    name: nftables
    enabled: true
    state: started
