# Coraza baseline (adapted from the upstream coraza.conf-recommended). Loaded before
# the OWASP CRS. Confirm against the coraza-caddy version you build with.

# Inspect and (selectively) deny requests.
SecRuleEngine On

# Request body handling.
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# Response body handling.
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json
SecResponseBodyLimit 1048576
SecResponseBodyLimitAction ProcessPartial

# Audit logging — RelevantOnly keeps the noise down; fail2ban reads Caddy's access log,
# this audit log is for investigation.
SecAuditEngine RelevantOnly
SecAuditLogParts ABIJDEFHZ
SecAuditLog /var/log/caddy/coraza-audit.log
SecAuditLogType Serial

# Miscellaneous.
SecArgumentSeparator &
SecCookieFormat 0
SecStatusEngine Off
